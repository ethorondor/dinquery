<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SageBite — What's for dinner?</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { amber: { 50: '#fffbeb', 100: '#fef3c7', 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' } } } }
    }
  </script>
</head>
<body class="min-h-screen bg-amber-50">

  <!-- Header -->
  <div class="bg-amber-600 text-white py-10 px-4 text-center">
    <h1 class="text-4xl font-bold tracking-tight">SageBite</h1>
    <p class="mt-2 text-amber-100 text-lg">Tell us what's in your fridge — we'll handle dinner.</p>
  </div>

  <div class="max-w-2xl mx-auto px-4 py-10">

    <!-- Form -->
    <form id="form" class="bg-white rounded-2xl shadow-md p-8 space-y-6">

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">What's in your fridge?</label>
        <textarea
          id="ingredients"
          class="w-full border border-gray-300 rounded-lg p-3 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none"
          rows="3"
          placeholder="e.g. chicken breast, garlic, spinach, heavy cream, onion, pasta"
          required
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Cuisine preference</label>
        <select
          id="cuisine"
          class="w-full border border-gray-300 rounded-lg p-3 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-amber-400"
        >
          {% for c in cuisines %}
          <option>{{ c }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Dietary restrictions</label>
        <div class="flex flex-wrap gap-2" id="restrictions">
          {% for r in restrictions %}
          <button
            type="button"
            data-restriction="{{ r }}"
            onclick="toggleRestriction(this)"
            class="restriction-btn px-3 py-1 rounded-full text-sm border border-gray-300 text-gray-600 bg-white hover:border-amber-400 transition-colors"
          >{{ r }}</button>
          {% endfor %}
        </div>
      </div>

      <p id="error" class="text-red-500 text-sm hidden"></p>

      <button
        type="submit"
        id="submit-btn"
        class="w-full bg-amber-500 hover:bg-amber-600 disabled:bg-amber-300 text-white font-semibold py-3 rounded-lg transition-colors"
      >
        Find Recipes
      </button>
    </form>

    <!-- Results -->
    <div id="results" class="hidden space-y-8 mt-0">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-gray-800">Your Dinner Options</h2>
        <button onclick="resetForm()" class="text-sm text-amber-600 hover:underline">Try again</button>
      </div>
      <div id="recipe-cards" class="space-y-8"></div>
      <button onclick="resetForm()" class="w-full border border-amber-500 text-amber-600 hover:bg-amber-50 font-semibold py-3 rounded-lg transition-colors">
        Try different ingredients
      </button>
    </div>

  </div>

  <script>
    const selectedRestrictions = new Set();

    function toggleRestriction(btn) {
      const r = btn.dataset.restriction;
      if (selectedRestrictions.has(r)) {
        selectedRestrictions.delete(r);
        btn.className = "restriction-btn px-3 py-1 rounded-full text-sm border border-gray-300 text-gray-600 bg-white hover:border-amber-400 transition-colors";
      } else {
        selectedRestrictions.add(r);
        btn.className = "restriction-btn px-3 py-1 rounded-full text-sm border bg-amber-500 text-white border-amber-500 transition-colors";
      }
    }

    function resetForm() {
      document.getElementById("form").classList.remove("hidden");
      document.getElementById("results").classList.add("hidden");
      document.getElementById("recipe-cards").innerHTML = "";
      document.getElementById("error").classList.add("hidden");
    }

    function renderRecipes(recipes) {
      const container = document.getElementById("recipe-cards");
      container.innerHTML = "";

      recipes.forEach((recipe, i) => {
        const ingredientBadges = recipe.ingredients_used
          .map(ing => `<span class="bg-green-50 text-green-700 border border-green-200 text-xs px-2 py-1 rounded-full">${ing}</span>`)
          .join("");

        const videoEmbed = recipe.youtube_video_id
          ? `<div class="aspect-video">
               <iframe class="w-full h-full" src="https://www.youtube.com/embed/${recipe.youtube_video_id}"
                 title="${recipe.youtube_title || recipe.name}"
                 allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                 allowfullscreen></iframe>
             </div>`
          : "";

        container.innerHTML += `
          <div class="bg-white rounded-2xl shadow-md overflow-hidden">
            <div class="p-6">
              <div class="flex items-start gap-3 mb-3">
                <span class="bg-amber-500 text-white text-sm font-bold w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0">${i + 1}</span>
                <div>
                  <h3 class="text-xl font-bold text-gray-800">${recipe.name}</h3>
                  <p class="text-gray-500 text-sm mt-1">${recipe.description}</p>
                </div>
              </div>
              <div class="bg-amber-50 border border-amber-100 rounded-lg px-4 py-3 text-sm text-amber-800 mb-4">
                <span class="font-semibold">Why #${i + 1}:</span> ${recipe.reason}
              </div>
              <div class="flex flex-wrap gap-2 mb-2">${ingredientBadges}</div>
            </div>
            ${videoEmbed}
          </div>`;
      });
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const errorEl = document.getElementById("error");

      btn.disabled = true;
      btn.textContent = "Thinking about your dinner...";
      errorEl.classList.add("hidden");

      try {
        const res = await fetch("/suggest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ingredients: document.getElementById("ingredients").value,
            cuisine: document.getElementById("cuisine").value,
            restrictions: Array.from(selectedRestrictions),
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong.");

        document.getElementById("form").classList.add("hidden");
        document.getElementById("results").classList.remove("hidden");
        renderRecipes(data.recipes);
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.textContent = "Find Recipes";
      }
    });
  </script>

</body>
</html>
